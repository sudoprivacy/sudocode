name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_scope:
        description: 'Artifacts to build for manual runs'
        required: true
        default: all
        type: choice
        options:
          - all
          - linux-x64

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x64:
    name: build-linux-x64
    if: github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all' || inputs.build_scope == 'linux-x64'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Install musl build dependencies
        shell: bash
        working-directory: /
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            musl-tools \
            pkg-config

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build static musl release binary
        run: cargo build --locked --release -p rusty-sudocode-cli --bin scode --target x86_64-unknown-linux-musl

      - name: Verify static musl binary
        shell: bash
        run: |
          set -euo pipefail
          binary="target/x86_64-unknown-linux-musl/release/scode"
          "$binary" --version
          ldd_output="$(ldd "$binary" 2>&1 || true)"
          echo "$ldd_output"
          if ! grep -Eq "not a dynamic executable|statically linked" <<< "$ldd_output"; then
            echo "Expected musl build to be a static binary" >&2
            exit 1
          fi
          if readelf -l "$binary" | grep -q "Requesting program interpreter"; then
            echo "Static musl binary unexpectedly has a dynamic interpreter" >&2
            exit 1
          fi

      - name: Stage release payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/scode-linux-x64"
          cp "target/x86_64-unknown-linux-musl/release/scode" "dist/scode-linux-x64/scode"
          cp "../README.md" "dist/scode-linux-x64/README.md"
          chmod +x "dist/scode-linux-x64/scode"

      - name: Archive release payload (tar.gz)
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist -czf "dist/scode-linux-x64.tar.gz" "scode-linux-x64"

      - name: Build deb installer
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          ../packaging/linux/deb/build-deb.sh \
            --version "$version" \
            --binary target/x86_64-unknown-linux-musl/release/scode \
            --output dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: scode-linux-x64
          path: rust/dist/scode-linux-x64.tar.gz

      - name: Upload deb workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: scode-linux-x64-deb
          path: rust/dist/scode_*_amd64.deb

  build:
    name: build-${{ matrix.name }}
    if: github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            os: ubuntu-24.04-arm
            bin: scode
            package_dir: scode-linux-arm64
            archive_name: scode-linux-arm64.tar.gz
          - name: macos-arm64
            os: macos-15
            bin: scode
            package_dir: scode-macos-arm64
            archive_name: scode-macos-arm64.tar.gz
          - name: macos-x64
            os: macos-15-intel
            bin: scode
            package_dir: scode-macos-x64
            archive_name: scode-macos-x64.tar.gz
          - name: windows-x64
            os: windows-2022
            bin: scode.exe
            package_dir: scode-windows-x64
            archive_name: scode-windows-x64.zip
          - name: windows-arm64
            os: windows-11-arm
            bin: scode.exe
            package_dir: scode-windows-arm64
            archive_name: scode-windows-arm64.zip
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --locked --release -p rusty-sudocode-cli --bin scode

      - name: Stage release payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.package_dir }}"
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.package_dir }}/${{ matrix.bin }}"
          cp "../README.md" "dist/${{ matrix.package_dir }}/README.md"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "dist/${{ matrix.package_dir }}/${{ matrix.bin }}"
          fi

      - name: Archive release payload (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "${{ matrix.package_dir }}"

      - name: Archive release payload (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/${{ matrix.package_dir }}" `
            -DestinationPath "dist/${{ matrix.archive_name }}" `
            -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_dir }}
          path: rust/dist/${{ matrix.archive_name }}

  publish-release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-x64
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum scode-* scode_*.deb > SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/scode-*
            dist/scode_*.deb
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Upload to Tencent COS
        if: env.TENCENT_SECRET_ID != '' && env.TENCENT_SECRET_KEY != ''
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          set -euo pipefail
          pip install coscmd --quiet
          coscmd config \
            -a "$TENCENT_SECRET_ID" \
            -s "$TENCENT_SECRET_KEY" \
            -b sudowork-release-1309794936 \
            -e cos.accelerate.myqcloud.com
          for file in dist/scode-*.tar.gz dist/scode-*.zip dist/scode_*.deb; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            echo "Uploading $filename"
            coscmd upload "$file" "sudocode/release/latest/$filename"
          done
          coscmd upload dist/SHA256SUMS.txt "sudocode/release/latest/SHA256SUMS.txt"
          echo "Done: https://sudowork-release-1309794936.cos.ap-beijing.myqcloud.com/sudocode/release/latest/"
