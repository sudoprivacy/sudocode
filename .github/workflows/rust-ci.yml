name: Rust CI

on:
  push:
    branches:
      - main
      - 'gaebal/**'
      - 'omx-issue-*'
    paths:
      - .github/workflows/rust-ci.yml
      - .github/workflows/release.yml
      - .github/scripts/check_doc_source_of_truth.py
      - .github/FUNDING.yml
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - docs/**
      - rust/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/rust-ci.yml
      - .github/workflows/release.yml
      - .github/scripts/check_doc_source_of_truth.py
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - LAST_PARITY_SYNC_COMMIT
      - docs/**
      - rust/**
      - .github/workflows/release.yml
      - .github/scripts/check_doc_source_of_truth.py
      - .github/FUNDING.yml
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - docs/**
      - rust/**
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: rust

env:
  CARGO_TERM_COLOR: always

jobs:
  doc-source-of-truth:
    name: docs source-of-truth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check docs and metadata for stale branding
        run: python .github/scripts/check_doc_source_of_truth.py

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check formatting
        run: cargo fmt --all --check

  test-workspace:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace tests
        run: cargo test --workspace

  clippy-workspace:
    name: cargo clippy --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace clippy
        run: cargo clippy --workspace

  live-api-smoke:
    name: Live API smoke test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run live API smoke tests
        working-directory: rust
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: cargo test -p rusty-sudocode-cli --test acp_live_smoke -- --test-threads=1
